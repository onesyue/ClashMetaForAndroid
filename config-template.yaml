    tolerance: 50
    proxies:
      - /(?i)(🇺🇸|美国|US|USA|America)/
    exclude-filter: "(?i)(剩余|到期|官网|群组|AI解锁)"
    url: https://cp.cloudflare.com/generate_204
    expected-status: 204
    interval: 300
    lazy: true

  - name: "悦 · 🇬🇧 英国"
