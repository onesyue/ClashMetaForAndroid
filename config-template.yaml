      - /(?i)(🇳🇱|荷兰|NL|Netherlands)/
    exclude-filter: "(?i)(剩余|到期|官网|群组)"
    url: https://cp.cloudflare.com/generate_204
    expected-status: 204
    interval: 300
    lazy: true

  - name: "悦 · 🇷🇺 俄罗斯"
    type: url-test
    tolerance: 50
    proxies:
      - /(?i)(🇷🇺|俄罗斯|RU|Russia)/
    exclude-filter: "(?i)(剩余|到期|官网|群组)"
    url: https://cp.cloudflare.com/generate_204
    expected-status: 204
    interval: 300
    lazy: true

  # ── 东南亚聚合（越南、马来、泰国、菲律宾、印尼、柬埔寨、缅甸、老挝）──
  - name: "悦 · 🌏 东南亚"
    type: url-test
    tolerance: 100
    proxies:
      - /(?i)(🇻🇳|越南|🇲🇾|马来|🇹🇭|泰国|🇵🇭|菲律宾|🇮🇩|印度尼西亚|印尼|🇰🇭|柬埔寨|🇲🇲|缅甸|🇱🇦|老挝)/
    exclude-filter: "(?i)(剩余|到期|官网|群组)"
    url: https://cp.cloudflare.com/generate_204
    expected-status: 204
    interval: 300
    lazy: true

  # ── 更多地区（全部节点，排除常用地区）────────────────────────
  - name: "悦 · 🌍 更多地区"
    type: select
    proxies:
      - /./
    exclude-filter: "(?i)(剩余|到期|官网|群组|流量|套餐|重置|过期|yue\\.to|@|香港|台湾|日本|韩国|新加坡|美国|英国|德国|澳大利亚|加拿大|荷兰|俄罗斯|越南|马来|泰国|菲律宾|印度尼西亚|柬埔寨|缅甸|老挝)"

