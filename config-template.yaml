      - /(?i)(🇩🇪|德国|DE|Germany)/
    exclude-filter: "(?i)(剩余|到期|官网|群组)"
    url: https://cp.cloudflare.com/generate_204
    expected-status: 204
    interval: 300
    lazy: true

  - name: "悦 · 🇦🇺 澳大利亚"
    type: url-test
    tolerance: 50
    proxies:
      - /(?i)(🇦🇺|澳大利亚|澳洲|AU|Australia)/
    exclude-filter: "(?i)(剩余|到期|官网|群组)"
    url: https://cp.cloudflare.com/generate_204
    expected-status: 204
    interval: 300
    lazy: true

  - name: "悦 · 🇨🇦 加拿大"
