    proxies:
      - /(?i)(🇬🇧|英国|UK|GB|Britain)/
    exclude-filter: "(?i)(剩余|到期|官网|群组)"
    url: https://cp.cloudflare.com/generate_204
    expected-status: 204
    interval: 300
    lazy: true

  - name: "悦 · 🇩🇪 德国"
