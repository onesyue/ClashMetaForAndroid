name: Build Pre-Release
on:
  workflow_dispatch:
  push:
    branches:
      - dev

jobs:
  BuildPreRelease:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'Bump version to')"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-increment patch version
        id: version
        run: |
          # Read current version from build.gradle.kts
          CURRENT=$(grep 'versionName = ' build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_CODE=$(printf "%1d%02d%03d" "$MAJOR" "$MINOR" "$PATCH")

          # Update build.gradle.kts
          sed -i "s/versionName = \"$CURRENT\"/versionName = \"$NEW_VERSION\"/" build.gradle.kts
          sed -i "s/versionCode = [0-9]*/versionCode = $NEW_CODE/" build.gradle.kts

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "code=$NEW_CODE" >> $GITHUB_OUTPUT
          echo "Auto-incremented: $CURRENT -> $NEW_VERSION ($NEW_CODE)"

      - name: Commit version bump
        run: |
          git config user.name 'GitHub Action'
          git config user.email 'action@github.com'
          git add build.gradle.kts
          git commit -m "Bump version to ${{ steps.version.outputs.version }} (${{ steps.version.outputs.code }})"
          git push

      - name: Checkout submodules
        run: git submodule update --init --recursive --force

      - name: Fetch submodule tags
        run: git -C core/src/foss/golang/clash fetch --force --tags origin

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: Apply Patches
        run: |
          cd $(go env GOROOT)
          for p in $GITHUB_WORKSPACE/.github/patch/*.patch; do patch --verbose -p 1 < "$p"; done

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Update CA
        run: |
          sudo apt-get update && sudo apt-get install ca-certificates
          sudo update-ca-certificates
          cp -f /etc/ssl/certs/ca-certificates.crt core/src/foss/golang/clash/component/ca/ca-certificates.crt

      - name: Setup signing (keystore)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore

      - name: Signing properties
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          touch signing.properties
          echo keystore.password="$SIGNING_STORE_PASSWORD" > signing.properties
          echo key.alias="$SIGNING_KEY_ALIAS" >> signing.properties
          echo key.password="$SIGNING_KEY_PASSWORD" >> signing.properties
          echo "remove.suffix=true" >> local.properties

          echo "Signing properties configured"

      - name: Pre-release Build
        if: success()
        run: ./gradlew --no-daemon app:assembleAlphaRelease

      # Delete old Prerelease-alpha
      - uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          tag_name: Prerelease-alpha
          github_token: ${{ secrets.GITHUB_TOKEN }}
          delete_release: true

      - name: Tag Repo
        uses: richardsimko/update-tag@v1
        with:
          tag_name: Prerelease-alpha
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Alpha
        uses: softprops/action-gh-release@v1
        if: ${{ success() }}
        with:
          tag_name: Prerelease-alpha
          name: "Pre-release v${{ steps.version.outputs.version }}"
          files: app/build/outputs/apk/alpha/release/*
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
